# docker-compose.voice-assistant.yml
#
# Minimal example for the Hailo AI HAT+2 voice assistant stack.
# This file shows only the voice-assistant services. Your full compose.yaml
# will likely include other services (Home Assistant, MQTT, Zigbee, etc.).
#
# Prerequisites on the Pi host:
#   - HailoRT 5.3.0 installed (run 01-install-hailo-voice-assistant.sh)
#   - hailo-ollama binary present at /usr/local/bin/hailo-ollama
#   - Model installed at /usr/local/share/hailo-ollama/models/
#     (run 02-install-hailo-ollama-npu.sh)
#
# Usage:
#   docker compose -f docker-compose.voice-assistant.yml up -d

services:

  # ── LLM inference (Hailo NPU) ──────────────────────────────────────────────
  hailo-ollama:
    container_name: hailo-ollama
    image: canthefason/hailo-ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"     # OpenAI-compat proxy (what Home Assistant talks to)
    devices:
      - /dev/h1x-0:/dev/h1x-0   # Hailo NPU device
    group_add:
      - "0"
    environment:
      - OLLAMA_KEEP_ALIVE=-1
      - HAILO_OLLAMA_VDEVICE_GROUP_ID=SHARED   # share NPU with hailo-whisper
      - XDG_DATA_HOME=/usr/local/share
      - LD_LIBRARY_PATH=/usr/lib               # find bind-mounted libhailort
      # Optional: override proxy inference defaults (v1.0.1+)
      # - OLLAMA_PROXY_NUM_CTX=1024
      # - OLLAMA_PROXY_NUM_PREDICT=60
      # - OLLAMA_PROXY_MAX_TOKENS=120
    volumes:
      # Model storage — populated by 02-install-hailo-ollama-npu.sh
      - /usr/local/share/hailo-ollama:/usr/local/share/hailo-ollama
      # Hailo proprietary binaries — bind-mounted from host (not baked into image)
      # Adjust libhailort version suffix to match your installed HailoRT version.
      # Check your version: ls /usr/lib/libhailort.so.*
      - /usr/local/bin/hailo-ollama:/usr/local/bin/hailo-ollama:ro
      - /usr/lib/libhailort.so.5.3.0:/usr/lib/libhailort.so.5.3.0:ro
      # Optional: override the default prompt config baked into the image.
      # Copy prompts.json to the Pi and uncomment this line to customise
      # tool-call examples, the instruction template, or the follow-up hint
      # without rebuilding the image.
      # - /home/ctf/homeassistant/prompts.json:/usr/local/bin/prompts.json:ro

  # ── Speech-to-Text / Wyoming (Hailo NPU) ───────────────────────────────────
  hailo-whisper:
    container_name: hailo-whisper
    image: canthefason/wyoming-hailo-whisper:latest
    restart: unless-stopped
    ports:
      - "10300:10300"     # Wyoming protocol (Home Assistant connects here)
    devices:
      - /dev/h1x-0:/dev/h1x-0   # Hailo NPU device
    environment:
      - HAILO_VDEVICE_GROUP_ID=SHARED          # share NPU with hailo-ollama
      - HAILO_OLLAMA_VDEVICE_GROUP_ID=SHARED
      - PYTHONPATH=/usr/lib/python3/dist-packages
      - LD_LIBRARY_PATH=/usr/lib
    volumes:
      # Hailo Python bindings — mounted from host.
      # Path depends on which Python was used during HailoRT install.
      # Find it with: find /usr -name "_pyhailort*.so" 2>/dev/null
      - /usr/local/lib/python3.13/dist-packages/hailo_platform:/usr/lib/python3/dist-packages/hailo_platform:ro
      # Native HailoRT library — adjust version suffix to match your install.
      - /usr/lib/libhailort.so.5.3.0:/usr/lib/libhailort.so.5.3.0:ro

  # ── Text-to-Speech / Wyoming (CPU) ─────────────────────────────────────────
  piper:
    container_name: wyoming-piper
    image: rhasspy/wyoming-piper:2.2.2
    restart: unless-stopped
    command: --voice en_US-lessac-medium
    ports:
      - "10200:10200"     # Wyoming protocol (Home Assistant connects here)
    volumes:
      - ./piper-data:/data
    environment:
      - TZ=America/Los_Angeles   # adjust to your timezone
