services:

  # ── Home Assistant (orchestrator) ──────────────────────────────────────────
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro

  # ── LLM inference (Hailo NPU) ──────────────────────────────────────────────
  # Runs the native hailo-ollama binary on port 11436 (internal) and the
  # OpenAI-compat proxy on port 11434 (what Home Assistant talks to).
  # The proxy repairs HA's malformed JSON, normalises roles, and enforces the
  # entity allowlist — do NOT point HA directly at the native binary.
  hailo-ollama:
    container_name: hailo-ollama
    image: canthefason/hailo-ollama:latest
    restart: unless-stopped
    privileged: true
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=-1
      - HAILO_VDEVICE_GROUP_ID=SHARED          # share NPU with wyoming-hailo-whisper
      - HAILO_OLLAMA_VDEVICE_GROUP_ID=SHARED
      - XDG_DATA_HOME=/usr/local/share
      - LD_LIBRARY_PATH=/usr/lib
      - OLLAMA_PROXY_NUM_CTX=2048       # increase if follow-up turns lose device context
      # - OLLAMA_PROXY_NUM_PREDICT=60   # hard cap for native Ollama endpoints (default 60)
      # - OLLAMA_PROXY_MAX_TOKENS=120   # hard cap on response length (default 120)
    volumes:
      # Model storage — two host dirs created by the package install:
      #   /usr/share/hailo-ollama/  manifests  (copy to hailoollama/ once after install)
      #   /usr/share/hailoollama/   blobs       (bind-mounted here)
      # One-time setup: sudo cp -r /usr/share/hailo-ollama/models/manifests \
      #                              /usr/share/hailoollama/models/
      - /usr/share/hailoollama:/usr/local/share/hailo-ollama
      - /usr/bin/hailo-ollama:/usr/local/bin/hailo-ollama:ro
      - /usr/lib/libhailort.so.5.3.0:/usr/lib/libhailort.so.5.3.0:ro
      - /usr/lib/aarch64-linux-gnu/libusb-1.0.so.0:/usr/lib/aarch64-linux-gnu/libusb-1.0.so.0:ro
      # Override the prompt config baked into the image without rebuilding:
      # - ./config/prompts.json:/usr/local/bin/prompts.json:ro

  # ── Speech-to-Text / Wyoming (Hailo NPU) ───────────────────────────────────
  # English-only HEF baked into the current image (whisper_small_en_encoder.hef).
  # German STT requires swapping to the multilingual HEF — see v2 plan.
  wyoming-hailo-whisper:
    container_name: wyoming-hailo-whisper
    image: canthefason/wyoming-hailo-whisper:latest
    restart: unless-stopped
    privileged: true
    ports:
      - "10800:10800"
    environment:
      - HAILO_VDEVICE_GROUP_ID=SHARED
      - PYTHONPATH=/usr/local/lib/python3.13/site-packages
      - LD_LIBRARY_PATH=/usr/lib
    volumes:
      - /dev/hailo0:/dev/hailo0
      - ${HAILO_PLATFORM_PATH:-/home/myai/.local/lib/python3.13/site-packages/hailo_platform}:/usr/local/lib/python3.13/site-packages/hailo_platform
      - /usr/lib/libhailort.so.5.3.0:/usr/lib/libhailort.so.5.3.0
      - /usr/lib/libhailort.so:/usr/lib/libhailort.so
      - ./whisper-data:/data
    command: >
      python3 -m wyoming_hailo_whisper
      --hef /opt/whisper/encoder.hef
      --uri tcp://0.0.0.0:10800
      --model small.en
      --language en

  # ── Text-to-Speech / Wyoming — German (CPU) ────────────────────────────────
  wyoming-piperde:
    container_name: wyoming-piper-de
    image: rhasspy/wyoming-piper:latest
    restart: unless-stopped
    ports:
      - "10200:10200"
    volumes:
      - ./piper-data-de:/data
    command: ["--voice", "de_DE-thorsten-high"]

  # ── Wake-word detection (CPU) ───────────────────────────────────────────────
  wyoming-openwakeword:
    container_name: wyoming-openwakeword
    image: rhasspy/wyoming-openwakeword:latest
    restart: unless-stopped
    ports:
      - "10400:10400"
    volumes:
      - ./openwakeword-data:/data
      - ./openwakeword-custom:/custom
    command: ["--preload-model", "ok_nabu"]

