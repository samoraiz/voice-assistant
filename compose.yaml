services:
  hailo-ollama:
    container_name: hailo-ollama
    image: canthefason/hailo-ollama:latest
    restart: unless-stopped
    ports:
      - 11434:11434
    volumes:
      - /usr/local/share/hailo-ollama:/usr/local/share/hailo-ollama
      - /usr/local/bin/hailo-ollama:/usr/local/bin/hailo-ollama:ro
      - /usr/lib/libhailort.so.5.3.0:/usr/lib/libhailort.so.5.3.0:ro
      - /usr/lib/aarch64-linux-gnu/libusb-1.0.so.0:/usr/lib/aarch64-linux-gnu/libusb-1.0.so.0:ro
    devices:
      - /dev/h1x-0:/dev/h1x-0
    group_add:
      - 0
    environment:
      - OLLAMA_KEEP_ALIVE=-1
      - HAILO_OLLAMA_VDEVICE_GROUP_ID=SHARED
      - XDG_DATA_HOME=/usr/local/share
      - LD_LIBRARY_PATH=/usr/lib
  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:2026.4.4"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - /home/ctf/homeassistant/config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    network_mode: host
  mqtt:
    container_name: mqtt
    image: eclipse-mosquitto:2.1.2-alpine
    restart: unless-stopped
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    ports:
      - "1883:1883"
    #network_mode: host
    privileged: true

  zigbee2mqtt:
    container_name: zigbee2mqtt
    image: ghcr.io/koenkk/zigbee2mqtt:2.9.2
    restart: unless-stopped
    volumes:
      - ./z2m/data:/app/data
      - /run/udev:/run/udev:ro
    ports:
      - "8080:8080"
    #network_mode: host
    environment:
      - TZ=America/Los_Angeles
    devices:
      - /dev/serial/by-id/usb-Silicon_Labs_CP2105_Dual_USB_to_UART_Bridge_Controller_0160A9D8-if00-port0:/dev/ttyUSB0
    depends_on:
      - mqtt

  zwave-js-ui:
    container_name: zwave-js-ui
    image: zwavejs/zwave-js-ui:11.16.1
    restart: unless-stopped
    tty: true
    stop_signal: SIGINT
    environment:
      - SESSION_SECRET=${ZWAVE_SESSION_SECRET}
      - TZ=America/Los_Angeles
    devices:
      # Use the if01 port for Z-Wave
      - /dev/serial/by-id/usb-Silicon_Labs_CP2105_Dual_USB_to_UART_Bridge_Controller_0160A9D8-if01-port0:/dev/zwave
    volumes:
      - ./zwave-js-ui:/usr/src/app/store
    ports:
      - "8091:8091" # Web UI
      - "3000:3000" # Z-Wave JS Server for Home Assistant
    depends_on:
      - mqtt

  ring-mqtt:
    container_name: ring-mqtt
    image: tsightler/ring-mqtt:5.9.3
    restart: unless-stopped
    environment:
      - MQTTHOST=mqtt  # Use your MQTT service name
      - MQTTPORT=1883
      #- MQTTUSER=your_user
      #- MQTTPASS=your_password
      - RINGTOKEN= # You will generate this via the container's web UI
    volumes:
      - ./ring-mqtt-data:/data
    depends_on:
      - mqtt

  matter-hub:
    image: ghcr.io/riddix/home-assistant-matter-hub:2.0.42
    container_name: matter-hub
    restart: unless-stopped
    network_mode: host # Critical for mDNS and Matter discovery
    environment:
      - HAMH_HOME_ASSISTANT_URL=http://localhost:8123
      - HAMH_HOME_ASSISTANT_ACCESS_TOKEN=${HA_ACCESS_TOKEN}
    volumes:
      - ./matter-hub:/data

  open-webui:
    image: ghcr.io/open-webui/open-webui:0.8.12
    container_name: open-webui
    restart: unless-stopped
    network_mode: host
    environment:
      - OLLAMA_BASE_URL=http://localhost:11434
      - WEBUI_AUTH=False
      - PORT=4000

  # Text-to-Speech (TTS)
  piper:
    container_name: wyoming-piper
    image: rhasspy/wyoming-piper:2.2.2
    command: --voice en_US-lessac-medium
    volumes:
      - ./piper-data:/data
    environment:
      - TZ=America/Los_Angeles
    ports:
      - "10200:10200"
    restart: unless-stopped

  esphome:
    container_name: esphome
    image: ghcr.io/esphome/esphome:2026.4.2
    volumes:
      - ./config:/config:rw
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    privileged: true # Required for USB passthrough (initial flashing)
    network_mode: host
    environment:
      - USERNAME=admin # Optional: Dashboard credentials
      - PASSWORD=123456

  carconnectivity-mqtt:
    container_name: carconnectivity
    image: tillsteinbach/carconnectivity-mqtt:0.10.3
    environment:
      - CONFIG_FILE=/data/carconnectivity.json
      - ADDITIONAL_INSTALLS=carconnectivity-plugin-mqtt_homeassistant carconnectivity-connector-volkswagen-na
    volumes:
      - ./carconnectivity:/data
      - ../carconnect:/opt/netrc:ro
    restart: unless-stopped
    depends_on:
      - mqtt

  uptime-kuma:
    image: louislam/uptime-kuma:2.2.1
    container_name: uptime-kuma
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "3001:3001"
    volumes:
      - ./kuma:/app/data
      # Allows Kuma to monitor other containers on your Pi 5
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    extra_hosts:
    - "host.docker.internal:host-gateway"

  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    extra_hosts:
    - "host.docker.internal:host-gateway"

  alloy:
    image: grafana/alloy:v1.15.0
    container_name: grafana-alloy
    user: "0:0"
    restart: unless-stopped
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /:/host:ro,rslave                        # for prometheus.exporter.unix
      - /var/run/docker.sock:/var/run/docker.sock  # for loki.source.docker (logs)
    entrypoint:
      - /bin/alloy
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    network_mode: host # Simplest for host monitoring
    pid: host          # Required to see host processes
    privileged: true

  cadvisor:
    image: ghcr.io/google/cadvisor:v0.53.0
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    ports:
      - "8081:8080"   # 8080 is already taken by zigbee2mqtt

  pypowerwall-server:
    image: jasonacox/pypowerwall-server:0.2.2
    container_name: pypowerwall-server
    restart: unless-stopped
    network_mode: host
    environment:
      - PW_HOST=192.168.91.1
      - PW_GW_PWD=${POWERWALL_PASSWORD}

  hailo-whisper:
    container_name: hailo-whisper
    image: canthefason/wyoming-hailo-whisper:1.1.0
    command: >
      python3 -m wyoming_hailo_whisper
      --hef /opt/whisper/encoder.hef
      --uri tcp://0.0.0.0:10300
      --model small.en
      --language en
      --corrections-file /logs/corrections.json
    environment:
      - HAILO_VDEVICE_GROUP_ID=SHARED
      - HAILO_OLLAMA_VDEVICE_GROUP_ID=SHARED
      # hailo_platform lives in the host's system Python path, not the
      # container's pip path — expose it via PYTHONPATH.
      - PYTHONPATH=/usr/lib/python3/dist-packages
      - LD_LIBRARY_PATH=/usr/lib
      - WHISPER_RAW_LOG=/logs/raw_transcripts.log
      - HA_URL=http://host.docker.internal:8123
      - HA_TOKEN=${HA_ACCESS_TOKEN}
    extra_hosts:
      - host.docker.internal:host-gateway
    devices:
      - /dev/h1x-0:/dev/h1x-0
    volumes:
      - /home/ctf/homeassistant/whisper-logs:/logs
      # Hailo Python bindings — mounted from host to avoid redistributing
      # Hailo's proprietary wheel inside the image.
      - /usr/local/lib/python3.13/dist-packages/hailo_platform:/usr/lib/python3/dist-packages/hailo_platform:ro
      # Native HailoRT library that the Python bindings link against.
      # Adjust the version suffix if you upgrade HailoRT on the host.
      - /usr/lib/libhailort.so.5.3.0:/usr/lib/libhailort.so.5.3.0:ro
      - /usr/lib/libhailort.so:/usr/lib/libhailort.so:ro
    ports:
      - "10300:10300"
    restart: unless-stopped

