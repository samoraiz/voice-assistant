services:

  # ── LLM inference (Hailo NPU) ──────────────────────────────────────────────
  hailo-ollama:
    container_name: hailo-ollama
    image: canthefason/hailo-ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"     # OpenAI-compat proxy (what Home Assistant talks to)
    devices:
      - /dev/h1x-0:/dev/h1x-0
    group_add:
      - "0"
    environment:
      - OLLAMA_KEEP_ALIVE=-1
      - HAILO_OLLAMA_VDEVICE_GROUP_ID=SHARED   # share NPU with hailo-whisper
      - XDG_DATA_HOME=/usr/local/share
      - LD_LIBRARY_PATH=/usr/lib
      # Override proxy inference defaults (v1.0.1+):
      # - OLLAMA_PROXY_NUM_CTX=1024
      # - OLLAMA_PROXY_NUM_PREDICT=60
      # - OLLAMA_PROXY_MAX_TOKENS=120
    volumes:
      # Model storage — actual host path is /usr/share/hailoollama (package install layout)
      # Container expects it at /usr/local/share/hailo-ollama (XDG_DATA_HOME=/usr/local/share)
      - /usr/share/hailoollama:/usr/local/share/hailo-ollama
      # Hailo proprietary binaries — bind-mounted from host (not baked into image)
      - /usr/bin/hailo-ollama:/usr/local/bin/hailo-ollama:ro
      - /usr/lib/libhailort.so.5.3.0:/usr/lib/libhailort.so.5.3.0:ro
      - /usr/lib/aarch64-linux-gnu/libusb-1.0.so.0:/usr/lib/aarch64-linux-gnu/libusb-1.0.so.0:ro
      # Override the prompt config baked into the image without rebuilding:
      # - ${HA_CONFIG_DIR}/prompts.json:/usr/local/bin/prompts.json:ro

  # ── Speech-to-Text / Wyoming (Hailo NPU) ───────────────────────────────────
  hailo-whisper:
    container_name: hailo-whisper
    image: canthefason/wyoming-hailo-whisper:latest
    restart: unless-stopped
    ports:
      - "10300:10300"     # Wyoming protocol (Home Assistant connects here)
    devices:
      - /dev/h1x-0:/dev/h1x-0
    environment:
      - HAILO_VDEVICE_GROUP_ID=SHARED          # share NPU with hailo-ollama
      - HAILO_OLLAMA_VDEVICE_GROUP_ID=SHARED
      - PYTHONPATH=/usr/lib/python3/dist-packages
      - LD_LIBRARY_PATH=/usr/lib
      # Optional: write raw Whisper transcripts + HA result to a log file.
      # Requires the volume mount below and HA_TOKEN to be set.
      # - WHISPER_RAW_LOG=/logs/raw_transcripts.log
      # - HA_URL=http://host.docker.internal:8123
      # - HA_TOKEN=${HA_ACCESS_TOKEN}
    extra_hosts:
      # Allows the container to reach Home Assistant on the host network.
      # Required for WHISPER_RAW_LOG; safe to keep even when logging is off.
      - "host.docker.internal:host-gateway"
    volumes:
      # Hailo Python bindings — bind-mounted from host.
      # Path depends on which Python was used during HailoRT install.
      # Find it with: find /usr -name "_pyhailort*.so" 2>/dev/null
      - /usr/local/lib/python3.13/dist-packages/hailo_platform:/usr/lib/python3/dist-packages/hailo_platform:ro
      # Native HailoRT library. Adjust version suffix if you upgrade HailoRT.
      - /usr/lib/libhailort.so.5.3.0:/usr/lib/libhailort.so.5.3.0:ro
      # Optional: writable directory for the raw transcript log.
      # Create it first: mkdir -p /opt/homeassistant/whisper-logs
      # - /opt/homeassistant/whisper-logs:/logs

  # ── Text-to-Speech / Wyoming (CPU) ─────────────────────────────────────────
  piper:
    container_name: wyoming-piper
    image: rhasspy/wyoming-piper:2.2.2
    restart: unless-stopped
    command: --voice en_US-lessac-medium
    ports:
      - "10200:10200"     # Wyoming protocol (Home Assistant connects here)
    volumes:
      - piper-data:/data
    environment:
      - TZ=${TZ:-America/Los_Angeles}

  # ── Home Assistant (orchestrator) ──────────────────────────────────────────
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:2026.4.4
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ${HA_CONFIG_DIR:-/opt/homeassistant/config}:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro

volumes:
  piper-data:

