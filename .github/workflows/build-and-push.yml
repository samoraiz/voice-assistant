# ============================================================
# build-and-push.yml
# Build and push the hailo-whisper Docker image using GitHub-hosted runners.
#
# Cross-compilation strategy:
#   ubuntu-latest (amd64) + QEMU + docker buildx → linux/arm64 image.
#   This works because:
#     - torch arm64 wheels are on PyPI
#     - whisper.load_model() runs under QEMU emulation (slow on first build,
#       then skipped entirely by Docker layer cache)
#     - hailo_platform is NOT in the image — it is bind-mounted from the Pi host
#
# Artifact supply:
#   The HailoRT Python wheel is proprietary and requires a Hailo developer
#   account to download. Each user must supply their own copy.
#
#   The encoder HEF (Whisper model compiled for Hailo NPU) is downloaded
#   automatically from the public Hailo CDN — no manual upload needed.
#
# One-time setup — GitHub → Settings → Secrets and Variables:
#
#   Secrets (Settings → Secrets → Actions):
#     DOCKERHUB_USERNAME   Docker Hub username
#     DOCKERHUB_TOKEN      Docker Hub access token (read/write)
#
#   NOTE: No HailoRT wheel secret needed. hailo_platform is bind-mounted
#   from the Pi host at runtime — it is never baked into the image.
#
#   Variables (Settings → Variables → Actions):
#     WHISPER_VERSION      Hailo model package version for CDN downloads.
#                          HEF files are fetched from:
#                            https://dev-public.hailo.ai/v<WHISPER_VERSION>/blob/Whisper-<Size>.hef
#                          e.g. set to "2.2.0" to fetch Whisper-Small.hef from v2.2.0
#     DOCKERHUB_IMAGE_NAME Optional: override default image name (canthefason/wyoming-hailo-whisper)
#
# Finding the right WHISPER_VERSION:
#   Browse https://dev-public.hailo.ai/ to find the version that contains the
#   HEF file for your model (Whisper-Small.hef, Whisper-Tiny.hef, Whisper-Base.hef).
# ============================================================
name: Build and Push

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'Dockerfile'
      - 'wyoming_hailo_whisper/**'
      - 'hailo_ollama_proxy/**'
      - '.github/workflows/build-and-push.yml'

  pull_request:
    paths:
      - 'Dockerfile'
      - 'wyoming_hailo_whisper/**'
      - 'hailo_ollama_proxy/**'

  workflow_dispatch:
    inputs:
      whisper_model:
        description: 'Whisper model (tiny.en / small.en / base.en)'
        required: false
        default: 'small.en'
      image_tag:
        description: 'Docker image tag (leave blank for auto)'
        required: false
        default: ''
      push_image:
        description: 'Push image to Docker Hub'
        type: boolean
        default: true

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE_NAME || 'canthefason/wyoming-hailo-whisper' }}
  HAILO_OLLAMA_IMAGE: ${{ vars.DOCKERHUB_HAILO_OLLAMA_IMAGE || 'canthefason/hailo-ollama' }}
  HAILO_VERSION: '5.3.0'
  # Default model when not triggered by workflow_dispatch
  DEFAULT_MODEL: 'small.en'

jobs:
  build:
    name: Build hailo-whisper (${{ inputs.whisper_model || 'small.en' }})
    runs-on: ubuntu-latest
    timeout-minutes: 90   # QEMU emulation of whisper.load_model() can be slow on cold cache

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Determine build parameters ────────────────────────────────────────
      - name: Determine build parameters
        id: params
        run: |
          # ── Model ──
          MODEL="${{ inputs.whisper_model || env.DEFAULT_MODEL }}"

          # ── Image tag ──
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            TAG="${{ inputs.image_tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="$(git rev-parse --short HEAD)"
          fi

          # ── HEF filename — derived from model name ──
          # small.en → whisper_small_en_encoder.hef (local name passed to Dockerfile)
          # small.en → Whisper-Small (CDN title used for download URL)
          MODEL_SLUG=$(echo "$MODEL" | tr '.' '_')
          HEF="whisper_${MODEL_SLUG}_encoder.hef"
          # Capitalize first segment: small → Small, tiny → Tiny, base → Base
          MODEL_SIZE=$(echo "$MODEL" | cut -d'.' -f1)
          HEF_TITLE="Whisper-${MODEL_SIZE^}"

          # ── Push decision ──
          PUSH=false
          if [[ "${{ github.event_name }}" == "push" ]] && \
             [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == refs/tags/* ]]; then
            PUSH=true
          fi
          if [[ "${{ inputs.push_image }}" == "true" ]]; then
            PUSH=true
          fi
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PUSH=false   # never push on PRs
          fi

          SHORT_SHA=$(git rev-parse --short HEAD)

          echo "model=${MODEL}"           >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"               >> "$GITHUB_OUTPUT"
          echo "hef=${HEF}"              >> "$GITHUB_OUTPUT"
          echo "hef_title=${HEF_TITLE}"  >> "$GITHUB_OUTPUT"
          echo "push=${PUSH}"            >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}"  >> "$GITHUB_OUTPUT"

          echo "──────────────────────────────────────"
          echo "  Image     : ${{ env.IMAGE_NAME }}:${TAG}"
          echo "  Model     : ${MODEL}"
          echo "  HEF (local): ${HEF}"
          echo "  HEF (CDN) : ${HEF_TITLE}.hef"
          echo "  Push      : ${PUSH}"
          echo "──────────────────────────────────────"

      # ── 3. QEMU — enable arm64 emulation on the amd64 runner ─────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # ── 4. Buildx ─────────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Download encoder HEF from Hailo public CDN ───────────────────────
      # URL pattern: https://dev-public.hailo.ai/v<WHISPER_VERSION>/blob/Whisper-<Size>.hef
      # The file is saved locally under the Dockerfile's expected name so the
      # build-arg HEF= path lines up with the COPY instruction.
      - name: Download encoder HEF
        run: |
          HEF="${{ steps.params.outputs.hef }}"
          HEF_TITLE="${{ steps.params.outputs.hef_title }}"
          VERSION="${{ vars.WHISPER_VERSION }}"

          if [[ -z "$VERSION" ]]; then
            echo "::error::Variable WHISPER_VERSION is not set."
            echo "Set it to the Hailo model package version that contains the HEF files."
            echo "Browse https://dev-public.hailo.ai/ to find the right version."
            exit 1
          fi

          HEF_URL="https://dev-public.hailo.ai/v${VERSION}/blob/${HEF_TITLE}.hef"
          echo "Downloading ${HEF_TITLE}.hef from Hailo CDN (v${VERSION})..."
          curl -fsSL -o "${HEF}" "${HEF_URL}"
          echo "  Downloaded: $(du -sh "${HEF}" | cut -f1)"

      # ── 6. Docker Hub login ────────────────────────────────────────────────────
      - name: Log in to Docker Hub
        if: steps.params.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 7. Build (and push) ────────────────────────────────────────────────────
      # Layer cache stored in GitHub Actions cache so repeat builds skip the
      # expensive torch install and whisper.load_model() layers entirely.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: ${{ steps.params.outputs.push == 'true' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.params.outputs.tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.params.outputs.short_sha }}
            ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && format('{0}:latest', env.IMAGE_NAME) || '' }}
          build-args: |
            HEF=${{ steps.params.outputs.hef }}
            WHISPER_MODEL=${{ steps.params.outputs.model }}
          # GitHub Actions layer cache — skips torch+whisper download on cache hit.
          # Cache key includes the model name so tiny/small/base get separate caches.
          cache-from: type=gha,scope=hailo-whisper-${{ steps.params.outputs.model }}
          cache-to:   type=gha,scope=hailo-whisper-${{ steps.params.outputs.model }},mode=max
          provenance: false   # smaller image — no SBOM/attestation layer on arm64

      # ── 8. Smoke test ─────────────────────────────────────────────────────────
      # Inspect the built image without running it (avoids slow QEMU startup).
      - name: Smoke test — verify image metadata
        if: steps.params.outputs.push != 'true'
        run: |
          # When not pushed, the image is in the local buildx cache. Load it first.
          docker buildx build \
            --platform linux/arm64 \
            --load \
            --build-arg HEF="${{ steps.params.outputs.hef }}" \
            --build-arg WHISPER_MODEL="${{ steps.params.outputs.model }}" \
            --cache-from type=gha,scope=hailo-whisper-${{ steps.params.outputs.model }} \
            -t smoke-test:local \
            . 2>&1 | tail -5

          docker inspect smoke-test:local \
            --format 'Entrypoint: {{json .Config.Entrypoint}}  Cmd: {{json .Config.Cmd}}'
          docker inspect smoke-test:local \
            --format '{{index .Config.Env}}' | tr ' ' '\n' | grep WHISPER_MODEL

      # ── 9. Job summary ────────────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          {
            echo "## hailo-whisper build"
            echo ""
            echo "| Field  | Value |"
            echo "|--------|-------|"
            echo "| Image  | \`${{ env.IMAGE_NAME }}:${{ steps.params.outputs.tag }}\` |"
            echo "| Model  | \`${{ steps.params.outputs.model }}\` |"
            echo "| HEF    | \`${{ steps.params.outputs.hef }}\` |"
            echo "| Pushed | ${{ steps.params.outputs.push }} |"
            echo "| Commit | \`${{ steps.params.outputs.short_sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ══════════════════════════════════════════════════════════════════════════════
  # hailo-ollama — OpenAI-compatibility proxy image
  # Much faster than wyoming-hailo-whisper: no QEMU-emulated model download,
  # just apt + two small Python files.
  # ══════════════════════════════════════════════════════════════════════════════
  build-hailo-ollama:
    name: Build hailo-ollama
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Determine build parameters ────────────────────────────────────────
      - name: Determine build parameters
        id: params
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            TAG="${{ inputs.image_tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="$(git rev-parse --short HEAD)"
          fi

          PUSH=false
          if [[ "${{ github.event_name }}" == "push" ]] && \
             [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == refs/tags/* ]]; then
            PUSH=true
          fi
          if [[ "${{ inputs.push_image }}" == "true" ]]; then
            PUSH=true
          fi
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PUSH=false
          fi

          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=${TAG}"               >> "$GITHUB_OUTPUT"
          echo "push=${PUSH}"            >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}"  >> "$GITHUB_OUTPUT"

          echo "──────────────────────────────────────"
          echo "  Image : ${{ env.HAILO_OLLAMA_IMAGE }}:${TAG}"
          echo "  Push  : ${PUSH}"
          echo "──────────────────────────────────────"

      # ── 3. QEMU + Buildx ─────────────────────────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Docker Hub login ───────────────────────────────────────────────────
      - name: Log in to Docker Hub
        if: steps.params.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 5. Build (and push) ───────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: hailo_ollama_proxy
          platforms: linux/arm64
          push: ${{ steps.params.outputs.push == 'true' }}
          tags: |
            ${{ env.HAILO_OLLAMA_IMAGE }}:${{ steps.params.outputs.tag }}
            ${{ env.HAILO_OLLAMA_IMAGE }}:${{ steps.params.outputs.short_sha }}
            ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && format('{0}:latest', env.HAILO_OLLAMA_IMAGE) || '' }}
          cache-from: type=gha,scope=hailo-ollama
          cache-to:   type=gha,scope=hailo-ollama,mode=max
          provenance: false

      # ── 6. Job summary ────────────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          {
            echo "## hailo-ollama build"
            echo ""
            echo "| Field  | Value |"
            echo "|--------|-------|"
            echo "| Image  | \`${{ env.HAILO_OLLAMA_IMAGE }}:${{ steps.params.outputs.tag }}\` |"
            echo "| Pushed | ${{ steps.params.outputs.push }} |"
            echo "| Commit | \`${{ steps.params.outputs.short_sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
